<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Memory Game</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="game-container">

    <!-- Compteur de coups -->
    <div class="scoreboard">
      <span class="moves-label">Coups</span>
      <span class="moves-count">{{ moves }}</span>
    </div>

    <!-- Grille 4x4 -->
    <div class="grid">
      <div
        class="card-wrapper"
        *ngFor="let card of cards"
        (click)="onCardClick(card)"
      >
        <div class="card" [class.flipped]="card.isFlipped || card.isMatched">

          <!-- Dos de la carte -->
          <div class="card-face card-back">
            <img src="assets/cards/card-back.png" alt="dos" />
          </div>

          <!-- Face de la carte -->
          <div class="card-face card-front">
            <img src="assets/cards/{{ card.image }}" alt="carte" />
          </div>

        </div>
      </div>
    </div>

    <!-- Message de victoire -->
    <div class="victory" *ngIf="isGameWon">
      <p class="victory-title">Bravo !</p>
      <p class="victory-sub">Terminé en {{ moves }} coups</p>
      <ion-button expand="block" color="primary" (click)="initGame()">
        Rejouer
      </ion-button>
    </div>

    <!-- Bouton rejouer en cours de partie -->
    <div class="restart" *ngIf="!isGameWon">
      <ion-button fill="outline" color="primary" (click)="initGame()">
        Recommencer
      </ion-button>
    </div>

  </div>

</ion-content>
